[options]
env_name = Custom
fig = 1
dynamic_name = Multirotor

navigation_3d = False
using_velocity_state = False
reward_type = reward_single_goal

; depth, lgmd, vector
perception = depth

algo = SAC
total_timesteps = 300000

policy_name = CNN_Spatial
net_arch = [256, 128]
activation_function = relu
cnn_feature_num = 200

keyboard_debug = False
generate_q_map = False
q_map_save_steps = 10000

use_wandb = True

[wandb]
name = Custom_Blocks_fig1_Multirotor_2D_SAC_CNN_Spatial
notes = Custom env fig1 route, 2D navigation, Multirotor dynamics, SAC with CNN_Spatial policy.

[environment]
max_depth_meters = 15
screen_height = 80
screen_width = 100

crash_distance = 0.5
accept_radius = 1
max_steps = 300

[multirotor]
dt = 0.1
v_xy_max = 3.0
v_xy_min = 0.3
v_z_max = 2.0
yaw_rate_max_deg = 60.0

; configs for DRL algorithms
[DRL]
gamma = 0.99
learning_rate = 3e-4
learning_starts = 10000
buffer_size = 100000
batch_size = 256
train_freq = 100
gradient_steps = 100
action_noise_sigma = 0
