[options]
env_name = Custom
fig = 1
dynamic_name = Multirotor

navigation_3d = False
using_velocity_state = True
reward_type = reward_paper

; depth, lgmd, vector
perception = depth

algo = SAC
total_timesteps = 320000

policy_name = Multi_Modal
; kept for config parsing compatibility in thread_train.py
cnn_feature_num = 256
net_arch = [128, 128]
activation_function = relu

keyboard_debug = False
generate_q_map = False
q_map_save_steps = 10000

use_wandb = True

[wandb]
name = Custom_Blocks_fig1_Multirotor_2D_SAC_Multi_Modal
notes = Custom env fig1 route, 2D navigation, Multirotor dynamics, SAC with Multi-Modal (4-frame Depth + State) fusion.

[environment]
max_depth_meters = 15
screen_height = 64
screen_width = 64

collision_distance = 0.5
precollision_distance = 1.4
accept_radius = 1
max_steps = 600

[multirotor]
dt = 0.1
v_xy_max = 2.0
v_xy_min = 0.2
v_z_max = 2.0
yaw_rate_max_deg = 90.0

; DRL settings
[DRL]
gamma = 0.99
learning_rate = 1e-4
learning_starts = 20000
buffer_size = 100000
batch_size = 256
train_freq = 1
gradient_steps = 1
action_noise_sigma = 0
